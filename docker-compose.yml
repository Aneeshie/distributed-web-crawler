services:
  redis:
    image: redis:7
    container_name: redis_crawler
    ports:
      - "6379:6379"

  postgres:
    image: postgres:18
    container_name: postgres_crawler
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  worker:
    build: .
    depends_on:
      - redis
      - postgres
    environment:
      REDIS_ADDR: redis:6379
      POSTGRES_URL: postgres://postgres:password123@postgres:5432/db?sslmode=disable
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

